<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Rudra Office</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0&display=swap">
  <style>.mi{font-family:'Material Symbols Outlined';font-size:20px;font-variation-settings:'FILL' 0;line-height:1;-webkit-font-smoothing:antialiased}</style>
</head>
<body>
  <!-- Title bar -->
  <div id="titlebar">
    <svg class="doc-icon" viewBox="0 0 48 48" width="24" height="24"><path fill="#4285F4" d="M7 2h24l10 10v32c0 1.1-.9 2-2 2H7c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2z"/><path fill="#A1C2FA" d="M31 2l10 10H33c-1.1 0-2-.9-2-2V2z"/><path fill="#fff" d="M11 22h22v2H11zm0 5h22v2H11zm0 5h14v2H11z"/></svg>
    <input class="doc-name" value="Untitled document" spellcheck="false">
    <div id="menubar"></div>
    <span class="spacer"></span>
    <button id="share-btn" onclick="window.rudra_save&&window.rudra_save()" style="display:none"><span class="mi" style="font-size:16px">lock</span> Share</button>
  </div>

  <!-- Toolbar (single row, Google Docs style) -->
  <div id="toolbar">
    <!-- Single row toolbar matching Google Docs -->
    <div class="tb">
      <button onclick="window._api&&window._api.Undo()" title="Undo (Ctrl+Z)"><span class="mi">undo</span></button>
      <button onclick="window._api&&window._api.Redo()" title="Redo (Ctrl+Y)"><span class="mi">redo</span></button>
      <button onclick="window.print()" title="Print (Ctrl+P)"><span class="mi">print</span></button>
      <button onclick="document.getElementById('file-picker').click()" title="Open file"><span class="mi">folder_open</span></button>
      <button id="save-btn" onclick="window.rudra_save()" title="Save (Ctrl+S)" style="display:none"><span class="mi">save</span></button>
    </div>
    <div class="sep"></div>
    <select id="tb-zoom" onchange="if(window._api&&window._api.WordControl){var wc=window._api.WordControl;var old=wc.m_nZoomValue;wc.m_nZoomValue=parseFloat(this.value);wc.zoom_Fire(0,old)}" title="Zoom" style="width:60px">
      <option value="50">50%</option><option value="75">75%</option><option value="100" selected>100%</option>
      <option value="125">125%</option><option value="150">150%</option><option value="200">200%</option>
    </select>
    <div class="sep"></div>
    <select id="tb-style" onchange="window._api&&window._api.put_Style(this.value)" title="Styles" style="width:110px">
      <option value="Normal">Normal text</option>
      <option value="Title">Title</option>
      <option value="Subtitle">Subtitle</option>
      <option value="Heading 1">Heading 1</option>
      <option value="Heading 2">Heading 2</option>
      <option value="Heading 3">Heading 3</option>
      <option value="Heading 4">Heading 4</option>
      <option value="Heading 5">Heading 5</option>
      <option value="Heading 6">Heading 6</option>
    </select>
    <div class="sep"></div>
    <select id="tb-font" onchange="window._api&&window._api.put_TextPrFontName(this.value)" title="Font" style="width:110px">
      <option>Arial</option><option>Calibri</option><option>Cambria</option>
      <option>Comic Sans MS</option><option>Courier New</option><option>Georgia</option>
      <option>Impact</option><option>Tahoma</option><option>Times New Roman</option>
      <option>Trebuchet MS</option><option>Verdana</option>
    </select>
    <div class="tb">
      <button onclick="var s=document.getElementById('tb-size');var v=parseFloat(s.value)-1;if(v>=6){s.value=v;window._api&&window._api.put_TextPrFontSize(v)}" title="Decrease font size" style="font-size:11px">−</button>
      <select id="tb-size" onchange="window._api&&window._api.put_TextPrFontSize(parseFloat(this.value))" title="Font size" style="width:48px;text-align:center">
        <option>8</option><option>9</option><option>10</option><option selected>11</option>
        <option>12</option><option>14</option><option>16</option><option>18</option>
        <option>20</option><option>24</option><option>28</option><option>36</option>
        <option>48</option><option>72</option>
      </select>
      <button onclick="var s=document.getElementById('tb-size');var v=parseFloat(s.value)+1;if(v<=96){s.value=v;window._api&&window._api.put_TextPrFontSize(v)}" title="Increase font size" style="font-size:11px">+</button>
    </div>
    <div class="sep"></div>
    <div class="tb">
      <button id="tb-bold" onclick="window._api&&window._api.put_TextPrBold(!window._fmtState.bold)" title="Bold (Ctrl+B)"><span class="mi">format_bold</span></button>
      <button id="tb-italic" onclick="window._api&&window._api.put_TextPrItalic(!window._fmtState.italic)" title="Italic (Ctrl+I)"><span class="mi">format_italic</span></button>
      <button id="tb-underline" onclick="window._api&&window._api.put_TextPrUnderline(!window._fmtState.underline)" title="Underline (Ctrl+U)"><span class="mi">format_underlined</span></button>
      <div class="tb" style="position:relative">
        <button class="palette-toggle" data-palette="fc-palette" title="Font color"><span class="mi" style="font-size:18px">format_color_text</span><span id="fc-bar" style="display:block;height:3px;width:16px;background:#000;margin-top:-2px"></span></button>
        <div id="fc-palette" class="color-palette" onmousedown="event.preventDefault()">
          <div data-fn="textcolor" data-c="#000000"></div><div data-fn="textcolor" data-c="#434343"></div><div data-fn="textcolor" data-c="#666666"></div><div data-fn="textcolor" data-c="#999999"></div><div data-fn="textcolor" data-c="#b7b7b7"></div><div data-fn="textcolor" data-c="#cccccc"></div><div data-fn="textcolor" data-c="#d9d9d9"></div><div data-fn="textcolor" data-c="#efefef"></div><div data-fn="textcolor" data-c="#f3f3f3"></div><div data-fn="textcolor" data-c="#ffffff" style="border:1px solid #ddd"></div>
          <div data-fn="textcolor" data-c="#980000"></div><div data-fn="textcolor" data-c="#ff0000"></div><div data-fn="textcolor" data-c="#ff9900"></div><div data-fn="textcolor" data-c="#ffff00"></div><div data-fn="textcolor" data-c="#00ff00"></div><div data-fn="textcolor" data-c="#00ffff"></div><div data-fn="textcolor" data-c="#4a86e8"></div><div data-fn="textcolor" data-c="#0000ff"></div><div data-fn="textcolor" data-c="#9900ff"></div><div data-fn="textcolor" data-c="#ff00ff"></div>
        </div>
      </div>
      <div class="tb" style="position:relative">
        <button class="palette-toggle" data-palette="hl-palette" title="Highlight color"><span class="mi" style="font-size:18px">ink_highlighter</span><span id="hl-bar" style="display:block;height:3px;width:16px;background:#ff0;margin-top:-2px"></span></button>
        <div id="hl-palette" class="color-palette" onmousedown="event.preventDefault()">
          <div data-fn="highlight" data-c="#ffff00"></div><div data-fn="highlight" data-c="#00ff00"></div><div data-fn="highlight" data-c="#00ffff"></div><div data-fn="highlight" data-c="#ff00ff"></div><div data-fn="highlight" data-c="#0000ff"></div><div data-fn="highlight" data-c="#ff0000"></div><div data-fn="highlight" data-c="#ff9900"></div><div data-fn="highlight" data-c="#000000"></div><div data-fn="highlight" data-c="#ffffff" style="border:1px solid #ddd"></div>
          <div data-fn="highlight" data-c="" style="background:linear-gradient(135deg,#fff 45%,#f00 50%,#fff 55%);border:1px solid #ddd" title="No highlight"></div>
        </div>
      </div>
    </div>
    <div class="sep"></div>
    <div class="tb">
      <button onclick="var u=prompt('URL:');u&&window._api&&window._api.add_Hyperlink({Value:u,Text:u||'Link'})" title="Insert link (Ctrl+K)"><span class="mi">link</span></button>
      <button onclick="if(window._api){var t=prompt('Comment:');if(t){var c=new Asc.asc_CCommentData();c.asc_putText(t);c.asc_putUserName('User');window._api.asc_addComment(c)}}" title="Add comment (Ctrl+Alt+M)"><span class="mi">add_comment</span></button>
      <button onclick="document.getElementById('img-picker').click()" title="Insert image"><span class="mi">image</span></button>
    </div>
    <div class="sep"></div>
    <div class="tb">
      <button data-align="1" onclick="window._api&&window._api.put_PrAlign(1)" title="Left align"><span class="mi">format_align_left</span></button>
      <button data-align="2" onclick="window._api&&window._api.put_PrAlign(2)" title="Center"><span class="mi">format_align_center</span></button>
      <button data-align="0" onclick="window._api&&window._api.put_PrAlign(0)" title="Right align"><span class="mi">format_align_right</span></button>
      <button data-align="3" onclick="window._api&&window._api.put_PrAlign(3)" title="Justify"><span class="mi">format_align_justify</span></button>
      <button onclick="window._api&&window._api.put_PrLineSpacing(1,1.15)" title="Line & paragraph spacing"><span class="mi">format_line_spacing</span></button>
    </div>
    <div class="sep"></div>
    <div class="tb">
      <button onclick="window._api&&window._api.put_ListType(0,1)" title="Bulleted list"><span class="mi">format_list_bulleted</span></button>
      <button onclick="window._api&&window._api.put_ListType(1,1)" title="Numbered list"><span class="mi">format_list_numbered</span></button>
      <button onclick="window._api&&window._api.DecreaseIndent()" title="Decrease indent"><span class="mi">format_indent_decrease</span></button>
      <button onclick="window._api&&window._api.IncreaseIndent()" title="Increase indent"><span class="mi">format_indent_increase</span></button>
    </div>
    <div class="sep"></div>
    <div class="tb">
      <button onclick="window._api&&window._api.ClearFormating&&window._api.ClearFormating()" title="Clear formatting"><span class="mi">format_clear</span></button>
    </div>
  </div>
  <input type="file" id="file-picker" accept=".docx,.doc,.odt,.txt,.rtf,.md" style="display:none">
  <input type="file" id="img-picker" accept="image/*" style="display:none">

  <div id="editor_sdk" tabindex="-1"></div>

  <div id="statusbar">
    <span id="sb-page">Page 1 of 1</span>
    <span id="sb-words">Words: 0</span>
    <span id="sb-paras">Paragraphs: 0</span>
    <span style="flex:1"></span>
    <button onclick="window._api&&window._api.zoomOut()" style="background:none;border:none;cursor:pointer;font-size:14px;color:#666" title="Zoom out">−</button>
    <span id="sb-zoom" style="min-width:36px;text-align:center">100%</span>
    <button onclick="window._api&&window._api.zoomIn()" style="background:none;border:none;cursor:pointer;font-size:14px;color:#666" title="Zoom in">+</button>
    <button onclick="window._api&&window._api.zoomFitToWidth()" style="background:none;border:none;cursor:pointer;font-size:11px;color:#666;margin-left:8px" title="Fit to width">Fit</button>
    <button onclick="window._api&&window._api.zoomFitToPage()" style="background:none;border:none;cursor:pointer;font-size:11px;color:#666" title="Fit to page">Page</button>
    <span style="margin-left:12px;color:#999">Rudra Office</span>
  </div>

  <script>
    window['AscNotLoadAllScript'] = true;

    // Track current formatting state for toggle buttons
    // Patch: CustomXmlManager missing Write_ToBinary2/Read_FromBinary2.
    // These are required by g_oTableId.Add (CChangesTableIdAdd) for history.
    // Without them, OpenDocumentFromBin crashes with "Write_ToBinary2 is not a function".
    if (window.AscCommonWord && AscCommonWord.CustomXmlManager) {
      var CXM = AscCommonWord.CustomXmlManager;
      if (!CXM.prototype.Write_ToBinary2) {
        CXM.prototype.Write_ToBinary2 = function(Writer) { Writer.WriteLong(0); };
      }
      if (!CXM.prototype.Read_FromBinary2) {
        CXM.prototype.Read_FromBinary2 = function(Reader) { Reader.GetLong(); };
      }
    }

    window._fmtState = { bold: false, italic: false, underline: false, strikeout: false };

    // Prevent toolbar/menubar clicks from stealing focus from editor canvas.
    // Without this, formatting buttons don't work because sdkjs needs canvas focus.
    document.getElementById('toolbar').addEventListener('mousedown', function(e) {
      if (e.target.tagName !== 'SELECT' && e.target.tagName !== 'INPUT') e.preventDefault();
    });
    document.getElementById('titlebar').addEventListener('mousedown', function(e) {
      if (e.target.tagName !== 'INPUT' && !e.target.classList.contains('doc-name')) e.preventDefault();
    });

    // Color palette setup
    (function() {
      // Set swatch background colors
      document.querySelectorAll('.color-palette div[data-c]').forEach(function(el) {
        if (el.dataset.c) el.style.backgroundColor = el.dataset.c;
      });

      // Toggle buttons
      document.querySelectorAll('.palette-toggle').forEach(function(btn) {
        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          var paletteId = this.dataset.palette;
          var palette = document.getElementById(paletteId);
          // Close all other palettes
          document.querySelectorAll('.color-palette').forEach(function(p) {
            if (p.id !== paletteId) p.style.display = 'none';
          });
          palette.style.display = palette.style.display === 'grid' ? 'none' : 'grid';
        });
      });

      // Swatch clicks
      document.querySelectorAll('.color-palette div[data-fn]').forEach(function(el) {
        el.addEventListener('click', function(e) {
          e.stopPropagation();
          var hex = this.dataset.c;
          var fn = this.dataset.fn;
          this.closest('.color-palette').style.display = 'none';
          if (!window._api) return;
          if (!hex) {
            if (fn === 'highlight') window._api.put_LineHighLight(false);
            return;
          }
          var r = parseInt(hex.substr(1,2),16), g = parseInt(hex.substr(3,2),16), b = parseInt(hex.substr(5,2),16);
          if (fn === 'textcolor') {
            var c = new Asc.asc_CColor(); c.asc_putR(r); c.asc_putG(g); c.asc_putB(b); c.asc_putA(255);
            window._api.put_TextColor(c);
            document.getElementById('fc-bar').style.background = hex;
          } else if (fn === 'highlight') {
            window._api.put_LineHighLight(true, r, g, b);
            document.getElementById('hl-bar').style.background = hex;
          }
        });
      });

      // Close on outside click
      document.addEventListener('click', function(e) {
        if (!e.target.closest('.palette-toggle') && !e.target.closest('.color-palette')) {
          document.querySelectorAll('.color-palette').forEach(function(p) { p.style.display = 'none'; });
        }
      });
    })();

    // Fix Chrome passive event listener warnings from OnlyOffice mousewheel handler.
    // sdkjs sets document.body.onmousewheel which Chrome treats as passive,
    // then calls preventDefault() inside it, causing console spam.
    // Intercept the assignment to re-register as non-passive.
    var _wheelHandler = null;
    Object.defineProperty(HTMLElement.prototype, 'onmousewheel', {
      configurable: true,
      get: function() { return _wheelHandler; },
      set: function(fn) {
        if (_wheelHandler) this.removeEventListener('wheel', _wheelHandler);
        _wheelHandler = fn;
        if (fn) this.addEventListener('wheel', fn, {passive: false});
      }
    });
  </script>

  <script src="onlyoffice-sdkjs/vendor/polyfill.js"></script>
  <script src="onlyoffice-web-apps/vendor/jquery/jquery.min.js"></script>
  <script src="onlyoffice-web-apps/vendor/xregexp/xregexp-all-min.js"></script>

  <script>
    var sdk_scripts = [];
  </script>
  <script src="onlyoffice-sdkjs/develop/sdkjs/word/scripts.js"></script>
  <script>
    var fixedScripts = sdk_scripts.map(function(s) {
      return s.replace('../../../../sdkjs/', 'onlyoffice-sdkjs/');
    });
    fixedScripts.forEach(function(src) {
      document.write('<script src="' + src + '"><\/script>');
    });
    document.write('<script src="onlyoffice-sdkjs/word/document/editor.js"><\/script>');
  </script>

  <script>
    window.addEventListener('load', function() {

      // --- Patches for standalone offline mode ---

      // Patch 0: Fix mouse-to-cursor coordinate sync.
      // The toolbar shifts editor_sdk down. sdkjs caches position in
      // checkBodyOffset() but only on Resize. We patch ConvertCoordsFromCursor2
      // to always refresh the offset before conversion.

      // Patch 1: Font name lookup — g_fonts_selection_bin is empty so
      // GetFontFileWeb always returns ASCW3. Override to use g_map_font_index.
      var origGetFontFileWeb = AscFonts.g_fontApplication.GetFontFileWeb;
      AscFonts.g_fontApplication.GetFontFileWeb = function(name, lStyle) {
        var idx = AscFonts.g_map_font_index[name];
        if (idx !== undefined) {
          var result = { m_wsFontName: name, m_wsFontPath: "", m_lIndex: 0 };
          this.FontPickerMap[name] = result;
          return result;
        }
        // Fallback unknown fonts to Arial
        idx = AscFonts.g_map_font_index["Arial"];
        if (idx !== undefined) {
          var result = { m_wsFontName: "Arial", m_wsFontPath: "", m_lIndex: 0 };
          this.FontPickerMap[name] = result;
          return result;
        }
        return origGetFontFileWeb.call(this, name, lStyle);
      };

      // Patch 2: checkStreamSignature fails for strings — getEmpty() returns
      // string "DOCY;..." but signature check compares char vs charCode.
      var origOpenDoc = Asc.asc_docs_api.prototype.openDocument;
      Asc.asc_docs_api.prototype.openDocument = function(file) {
        if (file && file.data && typeof file.data === 'string' && file.data.indexOf('DOCY') === 0) {
          file.bSerFormat = true;
        }
        return origOpenDoc.call(this, file);
      };

      // --- Initialize editor ---

      try {
        var api = new Asc.asc_docs_api({ 'id-view': 'editor_sdk' });
        window._api = api;
        window.editor = api;

        // Patch coordinate sync for the custom shell.
        // OnlyOffice's default checkBodyOffset uses jQuery.offset(), which is
        // fragile in this flex + custom-toolbar layout. Mouse events are in
        // page coordinates, so derive editor offsets from rect + page scroll.
        if (api.WordControl && api.WordControl.checkBodyOffset) {
          api.WordControl.checkBodyOffset = function() {
            var el = document.getElementById(this.Name);
            if (!el) return;

            var rect = el.getBoundingClientRect();
            var x = rect.left + window.pageXOffset;
            var y = rect.top + window.pageYOffset;

            if (AscCommon.AscBrowser.isOffsetUsedZoom()) {
              x *= AscCommon.AscBrowser.zoom;
              y *= AscCommon.AscBrowser.zoom;
            }

            this.X = x;
            this.Y = y;
          };
        }

        // Refresh editor position before every cursor->document coordinate conversion.
        // Refresh editor position before every coordinate conversion.
        var dd = api.WordControl.m_oDrawingDocument;
        if (dd && dd.ConvertCoordsFromCursor2) {
          var _origConvert = dd.ConvertCoordsFromCursor2.bind(dd);
          dd.ConvertCoordsFromCursor2 = function(x, y, zoomVal, isRulers) {
            api.WordControl.checkBodyOffset();
            return _origConvert(x, y, zoomVal, isRulers);
          };
        }

        // Wire offline CoAuthoring callbacks
        api.CoAuthoringApi.onFirstLoadChangesEnd = function() {
          api.asyncServerIdEndLoaded();
        };
        api.CoAuthoringApi.onFirstConnect = function() {};

        api.asc_registerCallback('asc_onDocumentContentReady', function() {
          console.log('[rudra] Document content ready');
          try { api.put_TextPrUnderline(false); } catch(e) {}
          // Full resize to recalculate all positions after toolbar changes layout.
          // WordControl.OnResize(true) recalculates editor div position, ruler
          // offsets, canvas dimensions, and cached coordinate offsets.
          setTimeout(function() {
            // Start word/paragraph count statistics after document is ready
            try { api.startGetDocInfo(); } catch(e) {}
            if (api.WordControl) {
              api.WordControl.OnResize(true);
            } else {
              api.Resize();
            }
            if (AscCommon && AscCommon.g_inputContext && AscCommon.g_inputContext.onResize) {
              AscCommon.g_inputContext.onResize('editor_sdk');
            }
          }, 200);
        });

        api.asc_registerCallback('asc_onError', function(id, level) {
          if (id !== -25) console.warn('[rudra] Error:', id, 'level:', level);
        });

        // Track formatting state for toolbar toggle buttons
        api.asc_registerCallback('asc_onBold', function(v) {
          window._fmtState.bold = !!v;
          var el = document.getElementById('tb-bold');
          if (el) el.classList.toggle('active', !!v);
        });
        api.asc_registerCallback('asc_onItalic', function(v) {
          window._fmtState.italic = !!v;
          var el = document.getElementById('tb-italic');
          if (el) el.classList.toggle('active', !!v);
        });
        api.asc_registerCallback('asc_onUnderline', function(v) {
          window._fmtState.underline = !!v;
          var el = document.getElementById('tb-underline');
          if (el) el.classList.toggle('active', !!v);
        });
        api.asc_registerCallback('asc_onStrikeout', function(v) {
          window._fmtState.strikeout = !!v;
          var el = document.getElementById('tb-strike');
          if (el) el.classList.toggle('active', !!v);
        });
        api.asc_registerCallback('asc_onFontFamily', function(f) {
          var el = document.getElementById('tb-font');
          if (el && f && f.get_Name) el.value = f.get_Name();
        });
        api.asc_registerCallback('asc_onFontSize', function(s) {
          var el = document.getElementById('tb-size');
          if (el && s) el.value = s;
        });

        // Page/word/paragraph statistics
        api.asc_registerCallback('asc_onDocInfo', function(info) {
          if (info) {
            var pages = info.get_PageCount();
            var words = info.get_WordsCount();
            var paras = info.get_ParagraphCount();
            if (pages >= 0) document.getElementById('sb-page').textContent = 'Page ' + (api.WordControl.m_oDrawingDocument ? (api.WordControl.m_oDrawingDocument.m_lCurrentPage + 1) : 1) + ' of ' + pages;
            if (words >= 0) document.getElementById('sb-words').textContent = 'Words: ' + words;
            if (paras >= 0) document.getElementById('sb-paras').textContent = 'Paragraphs: ' + paras;
          }
        });
        api.asc_registerCallback('asc_onCurrentPage', function(page) {
          var total = api.WordControl.m_oLogicDocument ? api.WordControl.m_oLogicDocument.Pages.length : '?';
          document.getElementById('sb-page').textContent = 'Page ' + (page + 1) + ' of ' + total;
        });
        // Zoom sync
        api.asc_registerCallback('asc_onZoomChange', function(zoom) {
          document.getElementById('sb-zoom').textContent = zoom + '%';
          var zoomSelect = document.getElementById('tb-zoom');
          if (zoomSelect) zoomSelect.value = zoom;
        });
        // startGetDocInfo is called inside asc_onDocumentContentReady

        // Open blank document in offline mode
        var docInfo = new Asc.asc_CDocInfo();
        docInfo.put_Id('rudra-doc-1');
        docInfo.put_Title('New Document');
        docInfo.put_Format('docx');
        docInfo.put_OfflineApp(true);

        api.asc_setDocInfo(docInfo);
        api.asc_LoadDocument();

        // Initialize menu bar
        import('./menubar.js').then(function(m) { m.createMenuBar(api); }).catch(function() {});

        // Image picker handler
        document.getElementById('img-picker').addEventListener('change', function(ev) {
          var file = ev.target.files[0];
          if (!file) return;
          var reader = new FileReader();
          reader.onload = function(e) {
            var img = new Image();
            img.onload = function() {
              if (api.asc_addImage) {
                api.asc_addImage([e.target.result]);
              }
            };
            img.src = e.target.result;
          };
          reader.readAsDataURL(file);
        });

        // PDF export
        window.rudra_export_pdf = async function() {
          try {
            var adapter = await import('./adapter.js');
            await adapter.initWasm();
            alert('PDF export: use Save DOCX then convert externally. Direct PDF export is coming soon.');
          } catch(e) { alert('PDF export failed: ' + e.message); }
        };

      } catch(e) {
        console.error('[rudra] Init failed:', e);
      }

      // Save button handler
      window.rudra_save = async function() {
        try {
          var adapter = await import('./adapter.js');
          var docxBytes = adapter.saveDocx(window._api);
          adapter.downloadFile(docxBytes, 'document.docx');
          console.log('[rudra] Document saved');
        } catch(err) {
          console.error('[rudra] Save failed:', err);
          alert('Save failed: ' + err.message);
        }
      };

      // File picker — opens DOCX via s1engine WASM adapter
      document.getElementById('file-picker').addEventListener('change', async function(e) {
        var file = e.target.files[0];
        if (!file) return;

        try {
          // Dynamically import the adapter (ES module)
          var adapter = await import('./adapter.js');
          await adapter.initWasm();

          var reader = new FileReader();
          reader.onload = async function(evt) {
            var bytes = new Uint8Array(evt.target.result);
            console.log('[rudra] Opening ' + file.name + ' (' + bytes.length + ' bytes)');
            try {
              await adapter.openDocx(bytes, window._api);
              document.getElementById('save-btn').style.display = 'block';
            } catch(err) {
              console.error('[rudra] Open failed:', err);
              alert('Failed to open document: ' + err.message);
            }
          };
          reader.readAsArrayBuffer(file);
        } catch(err) {
          console.error('[rudra] Adapter load failed:', err);
          alert('Failed to load WASM adapter: ' + err.message);
        }
      });
    });
  </script>
</body>
</html>
