<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Rudra Office</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    #toolbar {
      position: fixed; top: 0; left: 0; right: 0;
      background: #f8f9fa; border-bottom: 1px solid #dadce0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px; z-index: 10000; user-select: none;
    }
    .tb-row { display: flex; align-items: center; gap: 2px; padding: 2px 8px; }
    .tb-row:first-child { border-bottom: 1px solid #eee; padding: 4px 8px; }
    .tb-group { display: flex; align-items: center; gap: 1px; }
    #toolbar button {
      padding: 4px 6px; border: none; border-radius: 3px;
      background: transparent; cursor: pointer; font-size: 13px; min-width: 26px;
      height: 28px; display: flex; align-items: center; justify-content: center;
      color: #444; font-family: inherit;
    }
    #toolbar button:hover { background: #e0e0e0; }
    #toolbar button.active { background: #d2e3fc; color: #1a73e8; }
    #toolbar button.tb-file { gap: 4px; padding: 4px 10px; font-size: 12px; }
    #toolbar select {
      padding: 3px 4px; border: 1px solid transparent; border-radius: 3px;
      font-size: 12px; background: transparent; height: 28px;
    }
    #toolbar select:hover { border-color: #dadce0; background: #e8eaed; }
    #toolbar input[type="color"] {
      width: 28px; height: 24px; border: 1px solid #dadce0; border-radius: 3px;
      padding: 1px; cursor: pointer; background: transparent;
    }
    .sep { width: 1px; height: 20px; background: #dadce0; margin: 0 3px; }
    #statusbar {
      position: fixed; bottom: 0; left: 0; right: 0; height: 22px;
      background: #f8f9fa; border-top: 1px solid #dadce0;
      display: flex; align-items: center; padding: 0 12px;
      font-size: 11px; color: #666; z-index: 10000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    #statusbar span { margin-right: 16px; }
    #editor_sdk { position: fixed; top: 66px; left: 0; right: 0; bottom: 22px; overflow: hidden; }
  </style>
</head>
<body>
  <div id="toolbar">
    <!-- Row 1: File + Edit -->
    <div class="tb-row">
      <div class="tb-group">
        <button class="tb-file" onclick="document.getElementById('file-picker').click()" title="Open (Ctrl+O)">Open</button>
        <button id="save-btn" class="tb-file" onclick="window.rudra_save()" title="Save (Ctrl+S)" style="display:none">Save</button>
        <button class="tb-file" onclick="window.rudra_export_pdf&&window.rudra_export_pdf()" title="Export PDF">PDF</button>
        <button class="tb-file" onclick="window.print&&window._api&&window._api.asc_Print()" title="Print (Ctrl+P)">Print</button>
      </div>
      <div class="sep"></div>
      <div class="tb-group">
        <button onclick="window._api&&window._api.Undo()" title="Undo (Ctrl+Z)">↩</button>
        <button onclick="window._api&&window._api.Redo()" title="Redo (Ctrl+Y)">↪</button>
      </div>
      <div class="sep"></div>
      <div class="tb-group">
        <select id="tb-style" onchange="window._api&&window._api.put_Style(this.value)" title="Paragraph Style" style="width:130px">
          <option value="Normal">Normal</option>
          <option value="Heading 1">Heading 1</option>
          <option value="Heading 2">Heading 2</option>
          <option value="Heading 3">Heading 3</option>
          <option value="Heading 4">Heading 4</option>
          <option value="Heading 5">Heading 5</option>
          <option value="Heading 6">Heading 6</option>
          <option value="No Spacing">No Spacing</option>
          <option value="Subtitle">Subtitle</option>
          <option value="Quote">Quote</option>
          <option value="Title">Title</option>
        </select>
        <select id="tb-font" onchange="window._api&&window._api.put_TextPrFontName(this.value)" title="Font" style="width:130px">
          <option>Arial</option><option>Calibri</option><option>Cambria</option>
          <option>Comic Sans MS</option><option>Courier New</option><option>Georgia</option>
          <option>Impact</option><option>Tahoma</option><option>Times New Roman</option>
          <option>Trebuchet MS</option><option>Verdana</option>
        </select>
        <select id="tb-size" onchange="window._api&&window._api.put_TextPrFontSize(parseFloat(this.value))" title="Font Size" style="width:50px">
          <option>8</option><option>9</option><option>10</option><option>11</option><option selected>12</option>
          <option>14</option><option>16</option><option>18</option><option>20</option><option>24</option>
          <option>28</option><option>36</option><option>48</option><option>72</option>
        </select>
      </div>
      <div class="sep"></div>
      <div class="tb-group">
        <label title="Zoom">
          <select id="tb-zoom" onchange="window._api&&window._api.asc_setZoom(parseFloat(this.value)/100)" style="width:60px">
            <option value="50">50%</option><option value="75">75%</option><option value="100" selected>100%</option>
            <option value="125">125%</option><option value="150">150%</option><option value="200">200%</option>
          </select>
        </label>
      </div>
    </div>
    <!-- Row 2: Formatting -->
    <div class="tb-row">
      <div class="tb-group">
        <button onclick="window._api&&window._api.put_TextPrBold(undefined)" title="Bold (Ctrl+B)" style="font-weight:bold">B</button>
        <button onclick="window._api&&window._api.put_TextPrItalic(undefined)" title="Italic (Ctrl+I)" style="font-style:italic">I</button>
        <button onclick="window._api&&window._api.put_TextPrUnderline(undefined)" title="Underline (Ctrl+U)" style="text-decoration:underline">U</button>
        <button onclick="window._api&&window._api.put_TextPrStrikeout(undefined)" title="Strikethrough" style="text-decoration:line-through">S</button>
        <button onclick="window._api&&window._api.put_TextPrSuperscript()" title="Superscript" style="font-size:10px;vertical-align:super">x²</button>
        <button onclick="window._api&&window._api.put_TextPrSubscript()" title="Subscript" style="font-size:10px;vertical-align:sub">x₂</button>
      </div>
      <div class="sep"></div>
      <div class="tb-group">
        <label title="Font Color">A<input type="color" id="tb-fontcolor" value="#000000" onchange="window._api&&window._api.put_TextColor(AscCommon.CreateAscColor(parseInt(this.value.substring(1,3),16),parseInt(this.value.substring(3,5),16),parseInt(this.value.substring(5,7),16)))"></label>
        <label title="Highlight" style="background:#ff0;padding:2px 4px;border-radius:3px;cursor:pointer" onclick="window._api&&window._api.put_PrHighlight(3)">H</label>
      </div>
      <div class="sep"></div>
      <div class="tb-group">
        <button onclick="window._api&&window._api.put_PrAlign(1)" title="Left">☰</button>
        <button onclick="window._api&&window._api.put_PrAlign(2)" title="Center">☰</button>
        <button onclick="window._api&&window._api.put_PrAlign(0)" title="Right">☰</button>
        <button onclick="window._api&&window._api.put_PrAlign(3)" title="Justify">☰</button>
      </div>
      <div class="sep"></div>
      <div class="tb-group">
        <button onclick="window._api&&window._api.put_ListType(1,1)" title="Numbered List">1.</button>
        <button onclick="window._api&&window._api.put_ListType(0,1)" title="Bulleted List">•</button>
        <button onclick="window._api&&window._api.IncreaseIndent()" title="Increase Indent">→|</button>
        <button onclick="window._api&&window._api.DecreaseIndent()" title="Decrease Indent">|←</button>
      </div>
      <div class="sep"></div>
      <div class="tb-group">
        <button onclick="window._api&&window._api.put_LineSpacing(1.0)" title="Line Spacing 1.0" style="font-size:10px">1.0</button>
        <button onclick="window._api&&window._api.put_LineSpacing(1.15)" title="Line Spacing 1.15" style="font-size:10px">1.15</button>
        <button onclick="window._api&&window._api.put_LineSpacing(1.5)" title="Line Spacing 1.5" style="font-size:10px">1.5</button>
        <button onclick="window._api&&window._api.put_LineSpacing(2.0)" title="Line Spacing 2.0" style="font-size:10px">2.0</button>
      </div>
      <div class="sep"></div>
      <div class="tb-group">
        <button onclick="window._api&&window._api.asc_AddTableSimple(3,3)" title="Insert Table">⊞</button>
        <button onclick="document.getElementById('img-picker').click()" title="Insert Image">🖼</button>
        <button onclick="var u=prompt('URL:');u&&window._api&&window._api.add_Hyperlink({Value:u,Text:u})" title="Insert Link">🔗</button>
        <button onclick="window._api&&window._api.put_AddPageBreak()" title="Page Break">⏎</button>
      </div>
    </div>
  </div>
  <input type="file" id="file-picker" accept=".docx,.doc,.odt,.txt,.rtf" style="display:none">
  <input type="file" id="img-picker" accept="image/*" style="display:none">

  <div id="editor_sdk" tabindex="-1"></div>

  <div id="statusbar">
    <span id="sb-page">Page 1</span>
    <span id="sb-words">Words: 0</span>
    <span style="flex:1"></span>
    <span>Rudra Office</span>
  </div>

  <script>
    window['AscNotLoadAllScript'] = true;

    // Fix Chrome passive event listener warnings from OnlyOffice mousewheel handler.
    // sdkjs sets document.body.onmousewheel which Chrome treats as passive,
    // then calls preventDefault() inside it, causing console spam.
    // Intercept the assignment to re-register as non-passive.
    var _wheelHandler = null;
    Object.defineProperty(HTMLElement.prototype, 'onmousewheel', {
      configurable: true,
      get: function() { return _wheelHandler; },
      set: function(fn) {
        if (_wheelHandler) this.removeEventListener('wheel', _wheelHandler);
        _wheelHandler = fn;
        if (fn) this.addEventListener('wheel', fn, {passive: false});
      }
    });
  </script>

  <script src="onlyoffice-sdkjs/vendor/polyfill.js"></script>
  <script src="onlyoffice-web-apps/vendor/jquery/jquery.min.js"></script>
  <script src="onlyoffice-web-apps/vendor/xregexp/xregexp-all-min.js"></script>

  <script>
    var sdk_scripts = [];
  </script>
  <script src="onlyoffice-sdkjs/develop/sdkjs/word/scripts.js"></script>
  <script>
    var fixedScripts = sdk_scripts.map(function(s) {
      return s.replace('../../../../sdkjs/', 'onlyoffice-sdkjs/');
    });
    fixedScripts.forEach(function(src) {
      document.write('<script src="' + src + '"><\/script>');
    });
    document.write('<script src="onlyoffice-sdkjs/word/document/editor.js"><\/script>');
  </script>

  <script>
    window.addEventListener('load', function() {

      // --- Patches for standalone offline mode ---

      // Patch 0: Fix mouse-to-cursor coordinate sync.
      // The toolbar shifts editor_sdk down. sdkjs caches position in
      // checkBodyOffset() but only on Resize. We patch ConvertCoordsFromCursor2
      // to always refresh the offset before conversion.

      // Patch 1: Font name lookup — g_fonts_selection_bin is empty so
      // GetFontFileWeb always returns ASCW3. Override to use g_map_font_index.
      var origGetFontFileWeb = AscFonts.g_fontApplication.GetFontFileWeb;
      AscFonts.g_fontApplication.GetFontFileWeb = function(name, lStyle) {
        var idx = AscFonts.g_map_font_index[name];
        if (idx !== undefined) {
          var result = { m_wsFontName: name, m_wsFontPath: "", m_lIndex: 0 };
          this.FontPickerMap[name] = result;
          return result;
        }
        // Fallback unknown fonts to Arial
        idx = AscFonts.g_map_font_index["Arial"];
        if (idx !== undefined) {
          var result = { m_wsFontName: "Arial", m_wsFontPath: "", m_lIndex: 0 };
          this.FontPickerMap[name] = result;
          return result;
        }
        return origGetFontFileWeb.call(this, name, lStyle);
      };

      // Patch 2: checkStreamSignature fails for strings — getEmpty() returns
      // string "DOCY;..." but signature check compares char vs charCode.
      var origOpenDoc = Asc.asc_docs_api.prototype.openDocument;
      Asc.asc_docs_api.prototype.openDocument = function(file) {
        if (file && file.data && typeof file.data === 'string' && file.data.indexOf('DOCY') === 0) {
          file.bSerFormat = true;
        }
        return origOpenDoc.call(this, file);
      };

      // --- Initialize editor ---

      try {
        var api = new Asc.asc_docs_api({ 'id-view': 'editor_sdk' });
        window._api = api;
        window.editor = api;

        // Patch coordinate sync for the custom shell.
        // OnlyOffice's default checkBodyOffset uses jQuery.offset(), which is
        // fragile in this flex + custom-toolbar layout. Mouse events are in
        // page coordinates, so derive editor offsets from rect + page scroll.
        if (api.WordControl && api.WordControl.checkBodyOffset) {
          api.WordControl.checkBodyOffset = function() {
            var el = document.getElementById(this.Name);
            if (!el) return;

            var rect = el.getBoundingClientRect();
            var x = rect.left + window.pageXOffset;
            var y = rect.top + window.pageYOffset;

            if (AscCommon.AscBrowser.isOffsetUsedZoom()) {
              x *= AscCommon.AscBrowser.zoom;
              y *= AscCommon.AscBrowser.zoom;
            }

            this.X = x;
            this.Y = y;
          };
        }

        // Refresh editor position before every cursor->document coordinate conversion.
        // Refresh editor position before every coordinate conversion.
        var dd = api.WordControl.m_oDrawingDocument;
        if (dd && dd.ConvertCoordsFromCursor2) {
          var _origConvert = dd.ConvertCoordsFromCursor2.bind(dd);
          dd.ConvertCoordsFromCursor2 = function(x, y, zoomVal, isRulers) {
            api.WordControl.checkBodyOffset();
            return _origConvert(x, y, zoomVal, isRulers);
          };
        }

        // Wire offline CoAuthoring callbacks
        api.CoAuthoringApi.onFirstLoadChangesEnd = function() {
          api.asyncServerIdEndLoaded();
        };
        api.CoAuthoringApi.onFirstConnect = function() {};

        api.asc_registerCallback('asc_onDocumentContentReady', function() {
          console.log('[rudra] Document content ready');
          try { api.put_TextPrUnderline(false); } catch(e) {}
          // Full resize to recalculate all positions after toolbar changes layout.
          // WordControl.OnResize(true) recalculates editor div position, ruler
          // offsets, canvas dimensions, and cached coordinate offsets.
          setTimeout(function() {
            if (api.WordControl) {
              api.WordControl.OnResize(true);
            } else {
              api.Resize();
            }
            if (AscCommon && AscCommon.g_inputContext && AscCommon.g_inputContext.onResize) {
              AscCommon.g_inputContext.onResize('editor_sdk');
            }
          }, 200);
        });

        api.asc_registerCallback('asc_onError', function(id, level) {
          if (id !== -25) // ignore non-critical CoAuth disconnect
            console.warn('[rudra] Error:', id, 'level:', level);
        });

        // Open blank document in offline mode
        var docInfo = new Asc.asc_CDocInfo();
        docInfo.put_Id('rudra-doc-1');
        docInfo.put_Title('New Document');
        docInfo.put_Format('docx');
        docInfo.put_OfflineApp(true);

        api.asc_setDocInfo(docInfo);
        api.asc_LoadDocument();

        // Status bar updates
        api.asc_registerCallback('asc_onCountPages', function(count) {
          document.getElementById('sb-page').textContent = 'Pages: ' + count;
        });
        api.asc_registerCallback('asc_onCurrentPage', function(page) {
          var total = api.asc_getCountPages ? api.asc_getCountPages() : '?';
          document.getElementById('sb-page').textContent = 'Page ' + (page + 1) + ' of ' + total;
        });

        // Image picker handler
        document.getElementById('img-picker').addEventListener('change', function(ev) {
          var file = ev.target.files[0];
          if (!file) return;
          var reader = new FileReader();
          reader.onload = function(e) {
            var img = new Image();
            img.onload = function() {
              if (api.asc_addImage) {
                api.asc_addImage([e.target.result]);
              }
            };
            img.src = e.target.result;
          };
          reader.readAsDataURL(file);
        });

        // PDF export
        window.rudra_export_pdf = async function() {
          try {
            var adapter = await import('./adapter.js');
            await adapter.initWasm();
            alert('PDF export: use Save DOCX then convert externally. Direct PDF export is coming soon.');
          } catch(e) { alert('PDF export failed: ' + e.message); }
        };

      } catch(e) {
        console.error('[rudra] Init failed:', e);
      }

      // Save button handler
      window.rudra_save = async function() {
        try {
          var adapter = await import('./adapter.js');
          var docxBytes = adapter.saveDocx(window._api);
          adapter.downloadFile(docxBytes, 'document.docx');
          console.log('[rudra] Document saved');
        } catch(err) {
          console.error('[rudra] Save failed:', err);
          alert('Save failed: ' + err.message);
        }
      };

      // File picker — opens DOCX via s1engine WASM adapter
      document.getElementById('file-picker').addEventListener('change', async function(e) {
        var file = e.target.files[0];
        if (!file) return;

        try {
          // Dynamically import the adapter (ES module)
          var adapter = await import('./adapter.js');
          await adapter.initWasm();

          var reader = new FileReader();
          reader.onload = async function(evt) {
            var bytes = new Uint8Array(evt.target.result);
            console.log('[rudra] Opening ' + file.name + ' (' + bytes.length + ' bytes)');
            try {
              await adapter.openDocx(bytes, window._api);
              document.getElementById('save-btn').style.display = 'block';
            } catch(err) {
              console.error('[rudra] Open failed:', err);
              alert('Failed to open document: ' + err.message);
            }
          };
          reader.readAsArrayBuffer(file);
        } catch(err) {
          console.error('[rudra] Adapter load failed:', err);
          alert('Failed to load WASM adapter: ' + err.message);
        }
      });
    });
  </script>
</body>
</html>
