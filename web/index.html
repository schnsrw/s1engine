<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Rudra Office</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; display: flex; flex-direction: column; }
    #toolbar {
      display: flex; align-items: center; gap: 2px; padding: 4px 8px;
      background: #f1f3f4; border-bottom: 1px solid #dadce0; flex-shrink: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px; z-index: 10000; user-select: none;
    }
    #toolbar .tb-group { display: flex; align-items: center; gap: 2px; }
    #toolbar button {
      padding: 5px 7px; border: none; border-radius: 4px;
      background: transparent; cursor: pointer; font-size: 13px; min-width: 28px;
      height: 30px; display: flex; align-items: center; justify-content: center;
      color: #444; font-family: inherit;
    }
    #toolbar button:hover { background: #e0e0e0; }
    #toolbar button.active { background: #d2e3fc; color: #1a73e8; }
    #toolbar button.tb-file {
      gap: 4px; padding: 5px 10px; font-size: 12px; color: #333;
    }
    #toolbar select {
      padding: 4px 6px; border: 1px solid transparent; border-radius: 4px;
      font-size: 13px; background: transparent; height: 30px;
    }
    #toolbar select:hover { border-color: #dadce0; background: #e8eaed; }
    #toolbar .sep { width: 1px; height: 22px; background: #dadce0; margin: 0 4px; }
    #editor_sdk { width: 100%; flex: 1; overflow: hidden; }
  </style>
</head>
<body>
  <div id="toolbar">
    <div class="tb-group">
      <button class="tb-file" onclick="document.getElementById('file-picker').click()" title="Open file">
        <svg width="16" height="16" viewBox="0 0 16 16"><path d="M1 3.5A1.5 1.5 0 012.5 2h3.879a1.5 1.5 0 011.06.44l1.122 1.12A1.5 1.5 0 009.62 4H13.5A1.5 1.5 0 0115 5.5v7a1.5 1.5 0 01-1.5 1.5h-11A1.5 1.5 0 011 12.5v-9z" fill="none" stroke="currentColor" stroke-width="1.2"/></svg>
        Open
      </button>
      <button id="save-btn" class="tb-file" onclick="window.rudra_save()" title="Save as DOCX" style="display:none">
        <svg width="16" height="16" viewBox="0 0 16 16"><path d="M2 2.5A1.5 1.5 0 013.5 1h6.379a1.5 1.5 0 011.06.44l2.122 2.12A1.5 1.5 0 0113.5 4.5V13.5A1.5 1.5 0 0112 15H3.5A1.5 1.5 0 012 13.5v-11zM5 1v3h5V1M4 9h7v5H4V9z" fill="none" stroke="currentColor" stroke-width="1.1"/></svg>
        Save
      </button>
    </div>
    <div class="sep"></div>
    <div class="tb-group">
      <button onclick="window._api&&window._api.Undo()" title="Undo (Ctrl+Z)">
        <svg width="16" height="16" viewBox="0 0 16 16"><path d="M4 7h8a3 3 0 010 6H8M4 7l3-3M4 7l3 3" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button onclick="window._api&&window._api.Redo()" title="Redo (Ctrl+Y)">
        <svg width="16" height="16" viewBox="0 0 16 16"><path d="M12 7H4a3 3 0 000 6h4M12 7l-3-3M12 7l-3 3" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
    <div class="sep"></div>
    <div class="tb-group">
      <select id="tb-font" onchange="window._api&&window._api.put_TextPrFontName(this.value)" title="Font" style="width:140px">
        <option>Arial</option><option>Times New Roman</option><option>Courier New</option>
      </select>
      <select id="tb-size" onchange="window._api&&window._api.put_TextPrFontSize(parseFloat(this.value))" title="Size" style="width:52px">
        <option>8</option><option>9</option><option>10</option><option>11</option><option selected>12</option>
        <option>14</option><option>16</option><option>18</option><option>20</option><option>24</option>
        <option>28</option><option>36</option><option>48</option><option>72</option>
      </select>
    </div>
    <div class="sep"></div>
    <div class="tb-group">
      <button id="tb-bold" onclick="window._api&&window._api.put_TextPrBold(undefined)" title="Bold (Ctrl+B)" style="font-weight:bold">B</button>
      <button id="tb-italic" onclick="window._api&&window._api.put_TextPrItalic(undefined)" title="Italic (Ctrl+I)" style="font-style:italic">I</button>
      <button id="tb-underline" onclick="window._api&&window._api.put_TextPrUnderline(undefined)" title="Underline (Ctrl+U)" style="text-decoration:underline">U</button>
      <button id="tb-strike" onclick="window._api&&window._api.put_TextPrStrikeout(undefined)" title="Strikethrough" style="text-decoration:line-through">S</button>
    </div>
    <div class="sep"></div>
    <div class="tb-group">
      <button onclick="window._api&&window._api.put_PrAlign(1)" title="Align Left">
        <svg width="16" height="16" viewBox="0 0 16 16"><path d="M2 3h12M2 6h8M2 9h12M2 12h8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
      </button>
      <button onclick="window._api&&window._api.put_PrAlign(2)" title="Center">
        <svg width="16" height="16" viewBox="0 0 16 16"><path d="M2 3h12M4 6h8M2 9h12M4 12h8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
      </button>
      <button onclick="window._api&&window._api.put_PrAlign(0)" title="Align Right">
        <svg width="16" height="16" viewBox="0 0 16 16"><path d="M2 3h12M6 6h8M2 9h12M6 12h8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
      </button>
      <button onclick="window._api&&window._api.put_PrAlign(3)" title="Justify">
        <svg width="16" height="16" viewBox="0 0 16 16"><path d="M2 3h12M2 6h12M2 9h12M2 12h12" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
      </button>
    </div>
  </div>
  <input type="file" id="file-picker" accept=".docx" style="display:none">

  <div id="editor_sdk" tabindex="-1"></div>

  <script>
    window['AscNotLoadAllScript'] = true;

    // Fix Chrome passive event listener warnings from OnlyOffice mousewheel handler.
    // sdkjs sets document.body.onmousewheel which Chrome treats as passive,
    // then calls preventDefault() inside it, causing console spam.
    // Intercept the assignment to re-register as non-passive.
    var _wheelHandler = null;
    Object.defineProperty(HTMLElement.prototype, 'onmousewheel', {
      configurable: true,
      get: function() { return _wheelHandler; },
      set: function(fn) {
        if (_wheelHandler) this.removeEventListener('wheel', _wheelHandler);
        _wheelHandler = fn;
        if (fn) this.addEventListener('wheel', fn, {passive: false});
      }
    });
  </script>

  <script src="onlyoffice-sdkjs/vendor/polyfill.js"></script>
  <script src="onlyoffice-web-apps/vendor/jquery/jquery.min.js"></script>
  <script src="onlyoffice-web-apps/vendor/xregexp/xregexp-all-min.js"></script>

  <script>
    var sdk_scripts = [];
  </script>
  <script src="onlyoffice-sdkjs/develop/sdkjs/word/scripts.js"></script>
  <script>
    var fixedScripts = sdk_scripts.map(function(s) {
      return s.replace('../../../../sdkjs/', 'onlyoffice-sdkjs/');
    });
    fixedScripts.forEach(function(src) {
      document.write('<script src="' + src + '"><\/script>');
    });
    document.write('<script src="onlyoffice-sdkjs/word/document/editor.js"><\/script>');
  </script>

  <script>
    window.addEventListener('load', function() {

      // --- Patches for standalone offline mode ---

      // Patch 1: Font name lookup — g_fonts_selection_bin is empty so
      // GetFontFileWeb always returns ASCW3. Override to use g_map_font_index.
      var origGetFontFileWeb = AscFonts.g_fontApplication.GetFontFileWeb;
      AscFonts.g_fontApplication.GetFontFileWeb = function(name, lStyle) {
        var idx = AscFonts.g_map_font_index[name];
        if (idx !== undefined) {
          var result = { m_wsFontName: name, m_wsFontPath: "", m_lIndex: 0 };
          this.FontPickerMap[name] = result;
          return result;
        }
        // Fallback unknown fonts to Arial
        idx = AscFonts.g_map_font_index["Arial"];
        if (idx !== undefined) {
          var result = { m_wsFontName: "Arial", m_wsFontPath: "", m_lIndex: 0 };
          this.FontPickerMap[name] = result;
          return result;
        }
        return origGetFontFileWeb.call(this, name, lStyle);
      };

      // Patch 2: checkStreamSignature fails for strings — getEmpty() returns
      // string "DOCY;..." but signature check compares char vs charCode.
      var origOpenDoc = Asc.asc_docs_api.prototype.openDocument;
      Asc.asc_docs_api.prototype.openDocument = function(file) {
        if (file && file.data && typeof file.data === 'string' && file.data.indexOf('DOCY') === 0) {
          file.bSerFormat = true;
        }
        return origOpenDoc.call(this, file);
      };

      // --- Initialize editor ---

      try {
        var api = new Asc.asc_docs_api({ 'id-view': 'editor_sdk' });
        window._api = api;
        window.editor = api;

        // Wire offline CoAuthoring callbacks
        api.CoAuthoringApi.onFirstLoadChangesEnd = function() {
          api.asyncServerIdEndLoaded();
        };
        api.CoAuthoringApi.onFirstConnect = function() {};

        api.asc_registerCallback('asc_onDocumentContentReady', function() {
          console.log('[rudra] Document content ready');
          // Fix: empty doc template has underline in default style — turn it off
          try { api.put_TextPrUnderline(false); } catch(e) {}
        });

        api.asc_registerCallback('asc_onError', function(id, level) {
          if (id !== -25) // ignore non-critical CoAuth disconnect
            console.warn('[rudra] Error:', id, 'level:', level);
        });

        // Open blank document in offline mode
        var docInfo = new Asc.asc_CDocInfo();
        docInfo.put_Id('rudra-doc-1');
        docInfo.put_Title('New Document');
        docInfo.put_Format('docx');
        docInfo.put_OfflineApp(true);

        api.asc_setDocInfo(docInfo);
        api.asc_LoadDocument();

      } catch(e) {
        console.error('[rudra] Init failed:', e);
      }

      // Save button handler
      window.rudra_save = async function() {
        try {
          var adapter = await import('./adapter.js');
          var docxBytes = adapter.saveDocx(window._api);
          adapter.downloadFile(docxBytes, 'document.docx');
          console.log('[rudra] Document saved');
        } catch(err) {
          console.error('[rudra] Save failed:', err);
          alert('Save failed: ' + err.message);
        }
      };

      // File picker — opens DOCX via s1engine WASM adapter
      document.getElementById('file-picker').addEventListener('change', async function(e) {
        var file = e.target.files[0];
        if (!file) return;

        try {
          // Dynamically import the adapter (ES module)
          var adapter = await import('./adapter.js');
          await adapter.initWasm();

          var reader = new FileReader();
          reader.onload = async function(evt) {
            var bytes = new Uint8Array(evt.target.result);
            console.log('[rudra] Opening ' + file.name + ' (' + bytes.length + ' bytes)');
            try {
              await adapter.openDocx(bytes, window._api);
              document.getElementById('save-btn').style.display = 'block';
            } catch(err) {
              console.error('[rudra] Open failed:', err);
              alert('Failed to open document: ' + err.message);
            }
          };
          reader.readAsArrayBuffer(file);
        } catch(err) {
          console.error('[rudra] Adapter load failed:', err);
          alert('Failed to load WASM adapter: ' + err.message);
        }
      });
    });
  </script>
</body>
</html>
